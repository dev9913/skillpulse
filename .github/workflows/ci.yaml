name: SkillPulse-CI

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker Image Tag"
        required: true
        default: "1.0.0"

env:
  IMAGE_TAG: ${{ github.event.inputs.image_tag }}

jobs:

  build-scan-push:
    name: Build & Scan ${{ matrix.service }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service:
        - frontend
        - backend
          
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Build the Docker ${{ matrix.service }} image
        run: |
          docker build -t dev7878/skillpulse-${{ matrix.service }}:${IMAGE_TAG} ./${{ matrix.service }}

      # - name: Run ${{ matrix.service }} Trivy Scan
      #   uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
      #   with:
      #     image-ref: 'dev7878/skillpulse-${{ matrix.service }}:${{ env.IMAGE_TAG }}'
      #     format: 'sarif'
      #     output: '${{ matrix.service }}-trivy-results.sarif'
      #     severity: 'HIGH,CRITICAL'
      #     exit-code: '1'

      - name: Run ${{ matrix.service }} Trivy Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output ${{ matrix.service }}-trivy-results.sarif \
            --exit-code 1 \
            dev7878/skillpulse-${{ matrix.service }}:${IMAGE_TAG}


      - name: Upload SARIF - ${{ matrix.service }}
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: '${{ matrix.service }}-trivy-results.sarif'
    
      # - name: Upload SARIF -${{ matrix.service }} Report
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: '${{ matrix.service }}-trivy-results.sarif'  

      - name: Docker Login 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  

      - name: Push ${{ matrix.service }} Image  
        run: |
          docker push dev7878/skillpulse-${{ matrix.service }}:${IMAGE_TAG}
        
