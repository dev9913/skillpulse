name: SkillPulse-CICD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker Image Tag"
        required: true
        default: "1.0.0"

jobs:

  build-scan-push:
    name: Build & Scan ${{ matrix.service }}
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service:
        - frontend
        - backend
          
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Build the Docker ${{ matrix.service }} image
        run: |
          docker build -t dev7878/skillpulse-${{ matrix.service }}:${IMAGE_TAG} ./${{ matrix.service }}

      - name: Run ${{ matrix.service }} Trivy Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output ${{ matrix.service }}-trivy-results.sarif \
            --exit-code 1 \
            dev7878/skillpulse-${{ matrix.service }}:${IMAGE_TAG}


      - name: Upload SARIF - ${{ matrix.service }}
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: '${{ matrix.service }}-trivy-results.sarif'

      - name: Docker Login 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  

      - name: Push ${{ matrix.service }} Image  
        run: |
          docker push dev7878/skillpulse-${{ matrix.service }}:${IMAGE_TAG}
        
  deploy:

    needs: [build-scan-push]
    runs-on: self-hosted
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      GIT_USER: dev9913
    strategy:    
      matrix:
        service:
          - frontend
          - backend
    steps:
      
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update K8S Manifest
        run: |
          yq -i '.spec.template.spec.containers[0].image = "dev7878/skillpulse-${{ matrix.service }}:'"$IMAGE_TAG"'"' \
          k8s/${{ matrix.service }}.yaml
    
      - name: Configure Git
        run: |
          git config --global user.name ${GIT_USER}
          git config --global user.email ${{ secrets.GIT_EMAIL }}

      - name: Commit Changes
        run: |
          git add k8s/${{ matrix.service }}.yaml
          git commit -m "Update ${{ matrix.service }} image to $IMAGE_TAG" || echo "No changes"

      - name: Rebase Latest Main
        run: |
          git pull --rebase origin main
    
      - name: Push Changes
        run: |
          git push https://\${GIT_USER}:\${{ secrets.GIT_TOKEN }}@github.com/${GIT_USER}/skillpulse.git HEAD:main
          
  argocd:

    needs: deploy
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform

    steps:
     
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan 

      - name: Terraform Apply
        run: terraform apply -auto-approve 
                    
