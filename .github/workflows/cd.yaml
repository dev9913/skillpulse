name: SkillPulse-CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["SkillPulse-CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      GIT_USER: dev9913

    strategy:    
      matrix:
        service:
          - frontend
          - backend

    steps:
      
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Update K8S Manifest
      #   run: |
      #    yq e -i '.spec.template.spec.containers[0].image |= sub(":.*"; ":" + strenv(IMAGE_TAG))' \
      #    k8s/${{ matrix.service }}.yaml 

      - name: Update K8S Manifest
        run: |
          yq -i '.spec.template.spec.containers[0].image = "dev7878/skillpulse-${{ matrix.service }}:'"$IMAGE_TAG"'"' \
          k8s/${{ matrix.service }}.yaml
    
      - name: Configure Git
        run: |
          git config --global user.name ${GIT_USER}
          git config --global user.email ${{ secrets.GIT_EMAIL }}

      - name: Commit Changes
        run: |
          git add k8s/${{ matrix.service }}.yaml
          git commit -m "Update ${{ matrix.service }} image to $IMAGE_TAG" || echo "No changes"

      - name: Rebase Latest Main
        run: |
          git pull --rebase origin main
    
      - name: Push Changes
        run: |
          git push https://\${GIT_USER}:\${{ secrets.GIT_TOKEN }}@github.com/${GIT_USER}/skillpulse.git HEAD:main
          
  argocd:

    needs: deploy
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform

    steps:
     
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan 

      - name: Terraform Apply
        run: terraform apply -auto-approve 
          
